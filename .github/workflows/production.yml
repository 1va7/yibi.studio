name: Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: yibi-studio

jobs:
  build:
    name: Build and push image
    runs-on:
      - self-hosted
      - abee
      - linux
      - x64
    outputs:
      tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve image tag
        id: image
        run: |
          set -euo pipefail
          tag="$(git rev-parse HEAD)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to private registry
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_PUSH_USER: ${{ secrets.REGISTRY_PUSH_USER }}
          REGISTRY_PUSH_PASSWORD: ${{ secrets.REGISTRY_PUSH_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$REGISTRY_PUSH_PASSWORD" \
            | docker login "$REGISTRY_HOST" \
              --username "$REGISTRY_PUSH_USER" \
              --password-stdin

      - name: Build image on abee
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
        run: |
          set -euo pipefail
          docker build \
            --tag "$REGISTRY_HOST/${IMAGE_NAME}:${{ steps.image.outputs.tag }}" \
            --tag "$REGISTRY_HOST/${IMAGE_NAME}:main-latest" \
            .

      - name: Push immutable SHA tag
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
        run: docker push "$REGISTRY_HOST/${IMAGE_NAME}:${{ steps.image.outputs.tag }}"

      - name: Push convenience main-latest tag
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
        run: docker push "$REGISTRY_HOST/${IMAGE_NAME}:main-latest"

  deploy:
    name: Deploy to mediatyphoon
    needs: build
    runs-on:
      - self-hosted
      - abee
      - linux
      - x64
    environment: production
    steps:
      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/yibi_studio_deploy
          chmod 600 ~/.ssh/yibi_studio_deploy

      - name: Deploy image without building on production host
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
        run: |
          set -euo pipefail
          image="$REGISTRY_HOST/${IMAGE_NAME}:${{ needs.build.outputs.tag }}"
          ssh \
            -i ~/.ssh/yibi_studio_deploy \
            -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            "set -euo pipefail
             cd '$PROD_APP_DIR'
             printf 'YIBI_STUDIO_IMAGE=%s\n' '${image}' > .env.image
             set -a
             . ./.env.image
             set +a
             docker compose --env-file .env.image -f compose.prod.yml pull yibi-studio
             docker compose --env-file .env.image -f compose.prod.yml up -d --no-build yibi-studio
             docker compose --env-file .env.image -f compose.prod.yml ps yibi-studio"
