name: Chrome CI

on:
  pull_request:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build chrome package
        run: npm run build:chrome

      - name: Pack chrome package
        run: npm run pack:chrome

      - name: Build site
        run: npm run build
